<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 13px;
      color: #202124;
      padding: 20px;
      background: #fff;
    }

    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #5f6368;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #1a73e8;
    }
    .form-group textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.5;
    }
    .form-group .hint {
      font-size: 11px;
      color: #80868b;
      margin-top: 3px;
    }

    .button-row {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 18px;
    }
    .button-row button {
      padding: 9px 22px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-cancel {
      background: none;
      border: 1px solid #dadce0;
      color: #5f6368;
    }
    .btn-cancel:hover { background: #f1f3f4; }
    .btn-send {
      background: #1a73e8;
      color: white;
      border: none;
    }
    .btn-send:hover { background: #1557b0; }
    .btn-send:disabled { background: #a8c7fa; cursor: not-allowed; }

    .status {
      text-align: center;
      padding: 8px;
      border-radius: 4px;
      margin-top: 10px;
      font-size: 12px;
      display: none;
    }
    .status.success {
      display: block;
      background: #e6f4ea;
      color: #137333;
    }
    .status.error {
      display: block;
      background: #fce8e6;
      color: #c5221f;
    }
  </style>
</head>
<body>

  <div class="form-group">
    <label>Requester's Name</label>
    <input type="text" id="reqName" placeholder="e.g. Jane Smith">
  </div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="reqEmail" placeholder="e.g. jane@example.com">
  </div>

  <div class="form-group">
    <label>Subject</label>
    <input type="text" id="reqSubject" value="">
  </div>

  <div class="form-group">
    <label>Message</label>
    <textarea id="reqMessage"></textarea>
    <div class="hint">Edit the message above before sending. The form link is included automatically if configured.</div>
  </div>

  <div class="status" id="status"></div>

  <div class="button-row">
    <button class="btn-cancel" id="btnCancel">Cancel</button>
    <button class="btn-send" id="btnSend">Send Email</button>
  </div>

<script>
  var nameInput = document.getElementById('reqName');
  var emailInput = document.getElementById('reqEmail');
  var subjectInput = document.getElementById('reqSubject');
  var messageInput = document.getElementById('reqMessage');
  var btnSend = document.getElementById('btnSend');
  var btnCancel = document.getElementById('btnCancel');
  var statusEl = document.getElementById('status');

  // Load defaults from Settings sheet
  google.script.run
    .withSuccessHandler(function(defaults) {
      subjectInput.value = defaults.subject || '';
      var linkText = defaults.formUrl || '[PASTE DONATION FORM LINK HERE]';
      var msg = (defaults.message || '').replace('{FORM_LINK}', linkText).replace('{NAME}', '');
      messageInput.value = msg;
    })
    .withFailureHandler(function() {
      subjectInput.value = 'Donation Request';
      messageInput.value = '';
    })
    .getDonationDefaults();

  // Update {NAME} in message when name field changes
  nameInput.addEventListener('blur', function() {
    var name = nameInput.value.trim();
    if (name) {
      var msg = messageInput.value;
      // Replace "Hi ," or "Hi {NAME}," with "Hi Name,"
      msg = msg.replace(/^Hi\s*,/i, 'Hi ' + name + ',');
      msg = msg.replace(/^Hi \{NAME\},/i, 'Hi ' + name + ',');
      messageInput.value = msg;
    }
  });

  // Tab from email to subject
  emailInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); subjectInput.focus(); }
  });
  nameInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); emailInput.focus(); }
  });

  btnCancel.addEventListener('click', function() {
    google.script.host.close();
  });

  btnSend.addEventListener('click', function() {
    var name = nameInput.value.trim();
    var email = emailInput.value.trim();
    var subject = subjectInput.value.trim();
    var message = messageInput.value.trim();

    if (!name) { showStatus('error', 'Please enter the requester\'s name.'); nameInput.focus(); return; }
    if (!email) { showStatus('error', 'Please enter an email address.'); emailInput.focus(); return; }
    if (!subject) { showStatus('error', 'Please enter a subject.'); subjectInput.focus(); return; }
    if (!message) { showStatus('error', 'Please enter a message.'); messageInput.focus(); return; }

    btnSend.disabled = true;
    btnSend.textContent = 'Sending...';
    statusEl.style.display = 'none';

    google.script.run
      .withSuccessHandler(function() {
        showStatus('success', 'Email sent to ' + email + '!');
        btnSend.textContent = 'Sent!';
        setTimeout(function() { google.script.host.close(); }, 1500);
      })
      .withFailureHandler(function(err) {
        showStatus('error', 'Error: ' + err.message);
        btnSend.disabled = false;
        btnSend.textContent = 'Send Email';
      })
      .sendDonationEmail({
        name: name,
        email: email,
        subject: subject,
        message: message
      });
  });

  function showStatus(type, msg) {
    statusEl.className = 'status ' + type;
    statusEl.textContent = msg;
    statusEl.style.display = 'block';
  }

  // Focus name field on open
  setTimeout(function() { nameInput.focus(); }, 100);
</script>

</body>
</html>
