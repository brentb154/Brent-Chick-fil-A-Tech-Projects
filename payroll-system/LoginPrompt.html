<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In Required - Payroll Review</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
      max-width: 420px;
      width: 100%;
      overflow: hidden;
    }
    
    .login-header {
      background: linear-gradient(135deg, #E51636 0%, #c41230 100%);
      padding: 40px 30px;
      text-align: center;
      color: white;
    }
    
    .login-header .logo-icon {
      width: 70px;
      height: 70px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      backdrop-filter: blur(10px);
    }
    
    .login-header .logo-icon .material-icons-round {
      font-size: 36px;
      color: white;
    }
    
    .login-header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    
    .login-header p {
      font-size: 14px;
      opacity: 0.9;
      font-weight: 400;
    }
    
    .login-body {
      padding: 40px 30px;
      text-align: center;
    }
    
    .lock-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    
    .lock-icon .material-icons-round {
      font-size: 40px;
      color: #64748b;
    }
    
    .login-body h2 {
      font-size: 20px;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 12px;
    }
    
    .login-body .description {
      font-size: 15px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    
    .name-input {
      display: block;
      width: 100%;
      max-width: 320px;
      margin: 0 auto 18px;
      padding: 13px 16px;
      font-family: inherit;
      font-size: 15px;
      color: #1e293b;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .name-input:focus {
      border-color: #E51636;
      background: white;
    }

    .login-error {
      margin-top: 14px;
      color: #c41230;
      font-size: 13px;
      min-height: 18px;
    }

    .sign-in-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #E51636;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      max-width: 280px;
    }

    .sign-in-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .sign-in-btn:hover {
      background: #c41230;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(229, 22, 54, 0.35);
    }
    
    .sign-in-btn:active {
      transform: translateY(0);
    }
    
    .sign-in-btn .material-icons-round {
      font-size: 22px;
    }
    
    .google-logo {
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3px;
    }
    
    .google-logo svg {
      width: 100%;
      height: 100%;
    }
    
    .login-footer {
      padding: 20px 30px 30px;
      text-align: center;
      border-top: 1px solid #f1f5f9;
    }
    
    .login-footer p {
      font-size: 13px;
      color: #94a3b8;
    }
    
    .login-footer a {
      color: #E51636;
      text-decoration: none;
      font-weight: 500;
    }
    
    .login-footer a:hover {
      text-decoration: underline;
    }
    
    /* Loading state */
    .sign-in-btn.loading {
      pointer-events: none;
      opacity: 0.8;
    }
    
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="logo-icon">
        <span class="material-icons-round">payments</span>
      </div>
      <h1>Payroll Review</h1>
      <p>Overtime & Payroll Management System</p>
    </div>
    
    <div class="login-body">
      <div class="lock-icon">
        <span class="material-icons-round">lock</span>
      </div>
      <h2>Sign In Required</h2>
      <p class="description">
        Enter your name to access Payroll Review.
      </p>

      <input type="text" id="userName" class="name-input" placeholder="Your name"
             autocomplete="name" maxlength="80" onkeydown="if(event.key==='Enter'){submitLogin();}">

      <button class="sign-in-btn" id="continueBtn" onclick="submitLogin()">
        <span class="material-icons-round">login</span>
        Continue
      </button>

      <div id="loginError" class="login-error"></div>
    </div>
    
    <div class="login-footer">
      <p>Need to submit a PTO request? <a href="?view=pto-request">Click here</a></p>
    </div>
  </div>

  <script>
    const BASE_URL = '<?= baseUrl ?>' || window.location.href.split('?')[0].split('#')[0];

    // Autofocus the name field on load
    window.addEventListener('DOMContentLoaded', function() {
      const input = document.getElementById('userName');
      if (input) input.focus();
    });

    function showError(msg) {
      const err = document.getElementById('loginError');
      if (err) err.textContent = msg || '';
    }

    function setBusy(busy) {
      const btn = document.getElementById('continueBtn');
      if (!btn) return;
      btn.disabled = busy;
      btn.innerHTML = busy
        ? '<div class="spinner"></div> Signing in...'
        : '<span class="material-icons-round">login</span> Continue';
    }

    function submitLogin() {
      const input = document.getElementById('userName');
      const name = (input && input.value || '').trim();
      showError('');
      if (!name) {
        showError('Please enter your name.');
        if (input) input.focus();
        return;
      }
      setBusy(true);
      google.script.run
        .withSuccessHandler(function(result) {
          if (result && result.token) {
            window.top.location.href = BASE_URL + '?token=' + encodeURIComponent(result.token);
          } else {
            setBusy(false);
            showError((result && result.error) || 'Could not sign in. Please try again.');
          }
        })
        .withFailureHandler(function(err) {
          setBusy(false);
          showError('Sign in failed. Please try again.');
        })
        .createSelfSession(name);
    }
  </script>
</body>
</html>
