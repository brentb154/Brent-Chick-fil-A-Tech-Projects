<body>
  <div id="demo-banner" style="position:fixed;top:0;left:0;right:0;z-index:99999;background:#00897B;color:#fff;font:600 13px/1.4 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;text-align:center;padding:7px 12px;box-shadow:0 1px 4px rgba(0,0,0,0.2);">
    DEMO PREVIEW — sample data only, nothing is saved. Passcode: <strong>1234</strong>
    &nbsp;·&nbsp; <a href="gallery-x7k2m9.html" style="color:#fff;text-decoration:underline;">All demos</a>
  </div>
  <div style="height:32px;"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ==================== UTILITY FUNCTIONS ====================

    // Debounce hook - delays execution until user stops typing
    function useDebounce(value, delay) {
      const [debouncedValue, setDebouncedValue] = useState(value);

      useEffect(() => {
        const handler = setTimeout(() => {
          setDebouncedValue(value);
        }, delay);

        return () => clearTimeout(handler);
      }, [value, delay]);

      return debouncedValue;
    }

    // Phone validation
    function validatePhone(area, prefix, line) {
      const full = area + prefix + line;

      if (full.length !== 10) {
        return { valid: false, error: 'Phone number must be 10 digits' };
      }

      if (area.startsWith('0') || area.startsWith('1')) {
        return { valid: false, error: 'Area code cannot start with 0 or 1' };
      }

      // Check for obviously fake numbers
      if (full === '5555555555' || /^(\d)\1{9}$/.test(full)) {
        return { valid: false, error: 'Please enter a valid phone number' };
      }

      return { valid: true };
    }

    // Form validation
    function validateForm(formData) {
      const errors = {};

      // Phone validation
      const phoneCheck = validatePhone(formData.phoneArea, formData.phonePrefix, formData.phoneLine);
      if (!phoneCheck.valid) errors.phone = phoneCheck.error;

      // Date validation - no future dates
      if (formData.dateOccurred) {
        const selectedDate = new Date(formData.dateOccurred);
        const today = new Date();
        today.setHours(23, 59, 59, 999);
        if (selectedDate > today) {
          errors.dateOccurred = 'Date cannot be in the future';
        }
      }

      // Guest name - should not contain numbers
      if (formData.guestName && /\d/.test(formData.guestName)) {
        errors.guestName = 'Name should not contain numbers';
      }

      // Description minimum length
      if (!formData.notes || formData.notes.length < 10) {
        errors.notes = 'Please provide more detail (at least 10 characters)';
      }

      return errors;
    }

    // Fetch with retry logic
    async function fetchWithRetry(url, options = {}, maxRetries = 3) {
      let lastError;

      for (let i = 0; i < maxRetries; i++) {
        try {
          const response = await fetch(url, options);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response;
        } catch (error) {
          lastError = error;
          // Wait before retrying (exponential backoff)
          if (i < maxRetries - 1) {
            await new Promise(resolve => setTimeout(resolve, Math.pow(2, i) * 1000));
          }
        }
      }

      throw lastError;
    }

    // Get user-friendly error message
    function getErrorMessage(error, context) {
      if (!navigator.onLine) {
        return 'You appear to be offline. Your data will be saved and submitted when you reconnect.';
      }

      if (error?.message?.includes('Failed to fetch')) {
        return 'Unable to connect to the server. Please check your internet connection.';
      }

      if (error?.message?.includes('403')) {
        return 'Access denied. Please log in again.';
      }

      if (error?.message?.includes('429')) {
        return 'Too many requests. Please wait a moment before trying again.';
      }

      const messages = {
        submit: 'Failed to submit complaint. Please try again.',
        fetch: 'Failed to load complaints. Please refresh the page.',
        update: 'Failed to update complaint. Your changes were not saved.',
        delete: 'Failed to delete complaint. Please try again.'
      };

      return messages[context] || 'An unexpected error occurred. Please try again.';
    }

    // Simple cache for API responses
    const apiCache = {
      data: {},
      set(key, value, ttlMinutes = 2) {
        this.data[key] = {
          value,
          expiry: Date.now() + (ttlMinutes * 60 * 1000)
        };
      },
      get(key) {
        const item = this.data[key];
        if (!item) return null;
        if (Date.now() > item.expiry) {
          delete this.data[key];
          return null;
        }
        return item.value;
      },
      clear() {
        this.data = {};
      }
    };

    // Offline queue management
    const offlineQueue = {
      add(complaint) {
        const queue = this.getAll();
        queue.push({
          ...complaint,
          queuedAt: new Date().toISOString(),
          offlineId: `offline_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`
        });
        localStorage.setItem('queuedComplaints', JSON.stringify(queue));
      },
      getAll() {
        return JSON.parse(localStorage.getItem('queuedComplaints') || '[]');
      },
      remove(offlineId) {
        const queue = this.getAll().filter(c => c.offlineId !== offlineId);
        localStorage.setItem('queuedComplaints', JSON.stringify(queue));
      },
      clear() {
        localStorage.removeItem('queuedComplaints');
      },
      getCount() {
        return this.getAll().length;
      }
    };

    // Analytics calculations
    function calculateDayOfWeekStats(complaints) {
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      const dayCounts = new Array(7).fill(0);

      complaints.forEach(complaint => {
        const date = new Date(complaint.timestamp);
        if (!isNaN(date.getTime())) {
          dayCounts[date.getDay()]++;
        }
      });

      const maxCount = Math.max(...dayCounts, 1);

      return days.map((day, index) => ({
        label: day,
        count: dayCounts[index],
        percentage: (dayCounts[index] / maxCount) * 100
      }));
    }

    function calculateWeeklyTrend(complaints) {
      const weeks = [];
      const now = new Date();

      for (let i = 3; i >= 0; i--) {
        const weekStart = new Date(now);
        weekStart.setDate(now.getDate() - (i * 7) - now.getDay());
        weekStart.setHours(0, 0, 0, 0);

        const weekEnd = new Date(weekStart);
        weekEnd.setDate(weekStart.getDate() + 6);
        weekEnd.setHours(23, 59, 59, 999);

        const count = complaints.filter(c => {
          const date = new Date(c.timestamp);
          return date >= weekStart && date <= weekEnd;
        }).length;

        weeks.push({
          label: `Week ${4 - i}`,
          count,
          percentage: 0
        });
      }

      const maxCount = Math.max(...weeks.map(w => w.count), 1);
      weeks.forEach(w => w.percentage = (w.count / maxCount) * 100);

      return weeks;
    }

    function calculateResolutionEffectiveness(complaints) {
      const resolutionCounts = {};
      const repeatsByResolution = {};

      // Group by phone to find repeat complainers
      const phoneGroups = {};
      complaints.forEach(c => {
        if (!phoneGroups[c.phone]) phoneGroups[c.phone] = [];
        phoneGroups[c.phone].push(c);
      });

      // Sort complaints by date for each phone
      Object.values(phoneGroups).forEach(group => {
        group.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
      });

      // Analyze resolutions
      complaints.forEach(complaint => {
        const resolution = complaint.resolution || 'Unknown';
        resolutionCounts[resolution] = (resolutionCounts[resolution] || 0) + 1;

        // Check if this guest came back after this resolution
        const guestComplaints = phoneGroups[complaint.phone] || [];
        const laterComplaints = guestComplaints.filter(c =>
          new Date(c.timestamp) > new Date(complaint.timestamp)
        );

        if (laterComplaints.length > 0) {
          repeatsByResolution[resolution] = (repeatsByResolution[resolution] || 0) + 1;
        }
      });

      return Object.keys(resolutionCounts).map(resolution => ({
        resolution,
        total: resolutionCounts[resolution],
        repeats: repeatsByResolution[resolution] || 0,
        effectivenessRate: Math.round(
          ((resolutionCounts[resolution] - (repeatsByResolution[resolution] || 0)) /
           resolutionCounts[resolution]) * 100
        )
      })).sort((a, b) => b.total - a.total);
    }

    // ==================== ICONS ====================

    // Icons

    const Edit = ({ color = "currentColor", size = 24 }) => (

    // Styles
    const styles = {
      container: {

    const APPS_SCRIPT_URL = 'https://demo.local/heard-log';
    const API_TOKEN = 'demo';

    (function () {

      // mutate this array for the session only and reset on page reload.
      function daysAgo(n) {

      }
      var SAMPLE = [
        { id: 'D001', phone: '2145550182', guestName: 'Maria Gonzalez', orderNumber: '4471', orderType: 'Drive-Thru', issueType: 'Order Accuracy', resolution: 'Replaced meal + coupon', includedDessert: 'Yes', dayPart: 'Lunch', dateOccurred: daysAgo(2), managerName: 'Jordan', notes: 'Missing fries on a 3-meal order.', timestamp: daysAgo(2), resolved: false, followUpNotes: '' },
        { id: 'D002', phone: '2145550182', guestName: 'Maria Gonzalez', orderNumber: '5093', orderType: 'Drive-Thru', issueType: 'Cold Food', resolution: 'Remade sandwich', includedDessert: 'No', dayPart: 'Dinner', dateOccurred: daysAgo(11), managerName: 'Priya', notes: 'Sandwich was cold at pickup.', timestamp: daysAgo(11), resolved: true, followUpNotes: 'Called guest, apologized.' },
        { id: 'D003', phone: '2145550199', guestName: 'Derek Allen', orderNumber: '4620', orderType: 'Mobile', issueType: 'Long Wait', resolution: 'Comped drink', includedDessert: 'No', dayPart: 'Breakfast', dateOccurred: daysAgo(1), managerName: 'Jordan', notes: 'Mobile order not started on arrival.', timestamp: daysAgo(1), resolved: false, followUpNotes: '' },

      ];
      var EMAILS = ['gm@example.com', 'ops-lead@example.com'];

      function json(obj, ok) {
        return Promise.resolve({
          ok: ok !== false,
          status: ok === false ? 400 : 200,
          json: function () { return Promise.resolve(obj); },
          text: function () { return Promise.resolve(JSON.stringify(obj)); }
        });
      }

      var _fetch = window.fetch;
      window.fetch = function (input, init) {
        var url = (typeof input === 'string') ? input : (input && input.url) || '';
        // Only intercept our fake backend; let CDN/React requests pass through.
        if (url.indexOf(APPS_SCRIPT_URL) !== 0) return _fetch.call(this, input, init);

        var body = {};
        if (init && typeof init.body === 'string') { try { body = JSON.parse(init.body); } catch (e) {} }
        var qs = (url.split('?')[1] || '');
        var getAction = (qs.match(/action=([^&]*)/) || [])[1];
        var action = body.action || getAction;

        switch (action) {
          case 'getAll':
            return json({ data: SAMPLE.slice() });

          case 'getEmailSettings':
            return json({ emails: EMAILS.slice() });

          case 'addEmail':
            if (body.email && EMAILS.indexOf(body.email) === -1) EMAILS.push(body.email);
            return json({ success: true, emails: EMAILS.slice() });

          case 'removeEmail':
            EMAILS = EMAILS.filter(function (e) { return e !== body.email; });
            return json({ success: true, emails: EMAILS.slice() });

          case 'checkPhone': {
            var phone = (qs.match(/phone=([^&]*)/) || [])[1] || '';
            var matches = SAMPLE.filter(function (c) { return c.phone === phone; });
            return json({ count: matches.length, complaints: matches });
          }

          case 'submit': {
            var rec = Object.assign({ id: 'D' + (1000 + SAMPLE.length) }, body);
            delete rec.action;
            SAMPLE.unshift(rec);
            return json({ success: true, id: rec.id });
          }

          case 'toggleResolved':
            SAMPLE.forEach(function (c) {
              if (c.id === body.id) { c.resolved = body.resolved; c.followUpNotes = body.followUpNotes || c.followUpNotes; }
            });
            return json({ success: true });

          case 'update':
            SAMPLE.forEach(function (c, i) { if (c.id === body.id) SAMPLE[i] = Object.assign({}, c, body); });
            return json({ success: true });

          case 'delete':
            SAMPLE = SAMPLE.filter(function (c) { return c.id !== body.id; });
            return json({ success: true });

          default:
            return json({ success: true });
        }
      };
    })();

    // Session timeout utility
    function useSessionTimeout(timeoutMinutes = 30, onTimeout) {
      const timeoutRef = useRef();
      const [lastActivity, setLastActivity] = useState(Date.now());

      const resetTimeout = useCallback(() => {
        setLastActivity(Date.now());
        if (timeoutRef.current) clearTimeout(timeoutRef.current);
        
        timeoutRef.current = setTimeout(() => {
          onTimeout();
        }, timeoutMinutes * 60 * 1000);
      }, [timeoutMinutes, onTimeout]);

      useEffect(() => {
        const events = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart', 'click'];
        
        const handleActivity = () => resetTimeout();
        
        events.forEach(event => {
          document.addEventListener(event, handleActivity);
        });

        resetTimeout();

        return () => {
          events.forEach(event => {
            document.removeEventListener(event, handleActivity);
          });
          if (timeoutRef.current) clearTimeout(timeoutRef.current);
        };
      }, [resetTimeout]);

      return lastActivity;
    }

    // Offline detection hook
    function useOnlineStatus() {
      const [isOnline, setIsOnline] = useState(navigator.onLine);

      useEffect(() => {
        const handleOnline = () => setIsOnline(true);
        const handleOffline = () => setIsOnline(false);

        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);

        return () => {
          window.removeEventListener('online', handleOnline);
          window.removeEventListener('offline', handleOffline);
        };
      }, []);

      return isOnline;
    }

    // Custom hook for toast notifications
    function useToast() {
      const [toasts, setToasts] = useState([]);

      const addToast = useCallback((message, type = 'success') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
      }, []);

      const removeToast = useCallback((id) => {
        setToasts(prev => prev.filter(t => t.id !== id));
      }, []);

      return { toasts, addToast, removeToast };
    }

    function SettingsModal({ isOpen, onClose }) {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [settingsPasscode, setSettingsPasscode] = useState('');
      const [emailList, setEmailList] = useState([]);
      const [newEmail, setNewEmail] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [archiveDays, setArchiveDays] = useState(
        parseInt(localStorage.getItem('archiveDays') || '35')
      );

      const handleArchiveDaysChange = (value) => {
        const parsed = parseInt(value);
        if (isNaN(parsed)) return;
        const days = Math.max(7, Math.min(365, parsed));
        setArchiveDays(days);
        localStorage.setItem('archiveDays', String(days));
      };

      useEffect(() => {
        if (isAuthenticated && isOpen) {
          fetchEmailSettings();
        }
      }, [isAuthenticated, isOpen]);

      const fetchEmailSettings = async () => {
        setLoading(true);
        try {
          const response = await fetch(`${APPS_SCRIPT_URL}?action=getEmailSettings`);
          const data = await response.json();
          setEmailList(data.emails || []);
        } catch (error) {
          console.error('Error fetching email settings:', error);
        }
        setLoading(false);
      };

      const handleSettingsLogin = (e) => {
        e.preventDefault();
        if (settingsPasscode === '1234') { // DEMO passcode (live tool uses your own 4-digit code)
          setIsAuthenticated(true);
          setError('');
        } else {
          setError('Incorrect settings passcode');
        }
      };

      const addEmail = async () => {
        if (!newEmail || !newEmail.includes('@')) {
          setError('Please enter a valid email');
          return;
        }

        try {
          const response = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: 'addEmail',
              email: newEmail
            }),
          });
          
          if (response.ok) {
            setEmailList([...emailList, newEmail]);
            setNewEmail('');
            setError('');
          }
        } catch (error) {
          console.error('Error adding email:', error);
          setError('Failed to add email');
        }
      };

      const removeEmail = async (email) => {
        try {
          const response = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: 'removeEmail',
              email: email
            }),
          });
          
          if (response.ok) {
            setEmailList(emailList.filter(e => e !== email));
          }
        } catch (error) {
          console.error('Error removing email:', error);
        }
      };

      if (!isOpen) return null;

      return (
        <div style={styles.modal}>
          <div style={styles.modalContent}>
            <div style={styles.modalHeader}>
              <h2 style={styles.modalTitle}>Settings</h2>
              <button style={styles.closeButton} onClick={onClose}>
                <X size={24} />
              </button>
            </div>

            {!isAuthenticated ? (
              <form onSubmit={handleSettingsLogin}>
                <label style={styles.label}>Enter Settings Passcode</label>
                <input
                  type="password"
                  style={styles.input}
                  value={settingsPasscode}
                  onChange={(e) => setSettingsPasscode(e.target.value)}
                  placeholder="Enter 4-digit settings passcode"
                  maxLength="4"
                />
                {error && <div style={styles.errorText}>{error}</div>}
                <button type="submit" style={styles.button}>
                  Access Settings
                </button>
              </form>
            ) : (
              <div>
                <h3 style={{ marginBottom: '20px' }}>Email Alert Configuration</h3>
                <p style={{ marginBottom: '20px', color: '#666' }}>
                  Emails will be sent when a guest with 4+ complaints submits a new complaint.
                </p>

                {loading ? (
                  <LoadingSpinner text="Loading settings..." />
                ) : (
                  <>
                    <div style={{ marginBottom: '20px' }}>
                      <label style={styles.label}>Add Email Address</label>
                      <div style={{ display: 'flex', gap: '10px' }}>
                        <input
                          type="email"
                          style={{ ...styles.input, marginBottom: '0' }}
                          value={newEmail}

                          style={{ ...styles.button, width: 'auto', padding: '0 20px' }}
                        >
                          Add

                      </div>
                    </div>

                    <div>
                      <label style={styles.label}>Current Email Recipients</label>
                      {emailList.length === 0 ? (
                        <p style={{ color: '#999' }}>No email recipients configured</p>
                      ) : (
                        emailList.map((email, index) => (
                          <div key={index} style={{
                            display: 'flex',
                            justifyContent: 'space-between',
                            alignItems: 'center',

    function ComplaintForm({ isOnline }) {
      // Refs for auto-focus
      const phoneAreaRef = useRef();
      const phonePrefixRef = useRef();
      const phoneLineRef = useRef();

      const [formData, setFormData] = useState({
        phoneArea: '',
        phonePrefix: '',
        phoneLine: '',
        guestName: '',
        orderNumber: '',
        orderType: '',
        issueType: '',
        resolution: '',
        includedDessert: false,
        dayPart: '',
        dateOccurred: '',
        managerName: '',
        notes: '',
      });
      const [submitStatus, setSubmitStatus] = useState('');
      const [phoneHistory, setPhoneHistory] = useState(null);
      const [showModal, setShowModal] = useState(false);
      const [isChecking, setIsChecking] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [showConfirm, setShowConfirm] = useState(false);
      const [rateLimitRemaining, setRateLimitRemaining] = useState(0);
      const [validationErrors, setValidationErrors] = useState({});

      // Debounce phone number for history check
      const fullPhone = formData.phoneArea + formData.phonePrefix + formData.phoneLine;
      const debouncedPhone = useDebounce(fullPhone, 500);

      // Check phone history when debounced phone changes
      useEffect(() => {
        if (debouncedPhone.length === 10) {
          checkPhoneHistory(debouncedPhone);
        } else {
          setPhoneHistory(null);
        }
      }, [debouncedPhone]);

      // Queue for offline submissions
      useEffect(() => {
        if (isOnline) {
          const queued = offlineQueue.getAll();
          if (queued.length > 0) {
            submitQueuedComplaints(queued);
          }
        }
      }, [isOnline]);

      const submitQueuedComplaints = async (complaints) => {
        let successCount = 0;
        for (const complaint of complaints) {
          try {
            await fetchWithRetry(APPS_SCRIPT_URL, {
              method: 'POST',
              body: JSON.stringify(complaint),
            });
            successCount++;
          } catch (error) {
            console.error('Error submitting queued complaint:', error);
          }
        }
        offlineQueue.clear();
        if (successCount > 0) {
          setSubmitStatus(`Submitted ${successCount} queued complaint(s)`);
        }
      };

      const checkPhoneHistory = async (phone) => {
        if (phone.length !== 10) return;

        // Validate phone first
        const phoneValidation = validatePhone(
          phone.substring(0, 3),
          phone.substring(3, 6),
          phone.substring(6, 10)
        );
        if (!phoneValidation.valid) {
          setValidationErrors(prev => ({ ...prev, phone: phoneValidation.error }));
          return;
        } else {
          setValidationErrors(prev => {
            const { phone, ...rest } = prev;
            return rest;
          });
        }

        setIsChecking(true);
        try {
          const response = await fetchWithRetry(`${APPS_SCRIPT_URL}?action=checkPhone&phone=${phone}`);
          const data = await response.json();

          if (data.count >= 2) {
            setPhoneHistory(data);
          } else {
            setPhoneHistory(null);
          }
        } catch (error) {
          console.error('Error checking phone history:', error);
        } finally {
          setIsChecking(false);
        }
      };

      const handlePhoneChange = (field, value, nextRef) => {
        const numericValue = value.replace(/\D/g, '');
        const maxLength = field === 'phoneLine' ? 4 : 3;

        if (numericValue.length <= maxLength) {
          setFormData(prev => ({ ...prev, [field]: numericValue }));

          // Auto-advance to next field when complete
          if (numericValue.length === maxLength && nextRef) {
            nextRef.current?.focus();
          }
        }
      };

      const handleSubmit = async (e) => {
        e && e.preventDefault();
        setShowConfirm(false);
        setIsSubmitting(true);
        setSubmitStatus('Submitting complaint...');

        const submissionPhone = formData.phoneArea + formData.phonePrefix + formData.phoneLine;

        const dataToSubmit = {
          action: 'submit',
          phone: submissionPhone,
          guestName: formData.guestName,
          orderNumber: formData.orderNumber,
          orderType: formData.orderType,
          issueType: formData.issueType,
          resolution: formData.resolution,
          includedDessert: formData.includedDessert,
          dayPart: formData.dayPart,
          dateOccurred: formData.dateOccurred,
          managerName: formData.managerName,
          notes: formData.notes,
          timestamp: new Date().toISOString(),
          resolved: false,
        };

        if (!isOnline) {
          // Save to offline queue
          offlineQueue.add(dataToSubmit);
          setSubmitStatus(`Complaint saved locally. ${offlineQueue.getCount()} pending upload.`);
          setIsSubmitting(false);
          resetForm();
          return;
        }

        try {
          const response = await fetchWithRetry(APPS_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(dataToSubmit),
          });

          if (response.ok) {
            setSubmitStatus('Complaint submitted successfully!');
            apiCache.clear(); // Clear cache so dashboard/search show new data
            resetForm();
            // Start rate limiting
            setRateLimitRemaining(30);
            const interval = setInterval(() => {
              setRateLimitRemaining(prev => {
                if (prev <= 1) {
                  clearInterval(interval);
                  return 0;
                }
                return prev - 1;
              });
            }, 1000);
          } else {
            throw new Error('Submission failed');
          }
        } catch (error) {
          console.error('Error:', error);
          setSubmitStatus(getErrorMessage(error, 'submit'));
        } finally {
          setIsSubmitting(false);
          setTimeout(() => setSubmitStatus(''), 5000);
        }
      };

      const resetForm = () => {
        setFormData({
          phoneArea: '',
          phonePrefix: '',
          phoneLine: '',
          guestName: '',
          orderNumber: '',
          orderType: '',
          issueType: '',
          resolution: '',

    function Dashboard() {
      const [complaints, setComplaints] = useState([]);
      const [loading, setLoading] = useState(true);
      const [stats, setStats] = useState({
        total: 0,
        totalUnresolved: 0,
        flaggedGuests: 0,
        topIssue: '',
        topDayPart: '',
        topManager: '',
      });
      const [showResolvedFilter, setShowResolvedFilter] = useState(true);
      const [resolvingId, setResolvingId] = useState(null);
      const [followUpText, setFollowUpText] = useState('');
      const [showGuestProfile, setShowGuestProfile] = useState(false);
      const [guestProfilePhone, setGuestProfilePhone] = useState(null);
      const archiveDays = parseInt(localStorage.getItem('archiveDays') || '35');

      useEffect(() => {
        fetchDashboardData();
      }, []);

      const fetchDashboardData = async () => {
        setLoading(true);
        try {
          const response = await fetch(`${APPS_SCRIPT_URL}?action=getAll`);
          const result = await response.json();
          const data = result.data || result; // Extract array from response
          
          const cutoffDate = new Date();
          cutoffDate.setDate(cutoffDate.getDate() - archiveDays);
          
          const activeComplaints = data.filter(complaint => {
            const complaintDate = new Date(complaint.timestamp);
            return complaintDate > cutoffDate;
          });
          
          setComplaints(activeComplaints);
          calculateStats(activeComplaints);
        } catch (error) {
          console.error('Error fetching data:', error);
          alert('Unable to connect to Google Sheets. Please check your internet connection.');
        } finally {
          setLoading(false);
        }
      };

      const calculateStats = (data) => {
        const total = data.length;
        const totalUnresolved = data.filter(c => !c.resolved).length;
        
        // Count unique guests with 3+ complaints
        const phoneMap = {};
        data.forEach(complaint => {
          if (!phoneMap[complaint.phone]) {
            phoneMap[complaint.phone] = [];
          }
          phoneMap[complaint.phone].push(complaint);
        });
        
        const flaggedGuests = Object.values(phoneMap).filter(complaints => complaints.length >= 2).length;
        
        // Find top issue
        const issueCount = {};
        data.forEach(complaint => {
          issueCount[complaint.issueType] = (issueCount[complaint.issueType] || 0) + 1;
        });
        const topIssue = Object.keys(issueCount).length > 0 
          ? Object.keys(issueCount).reduce((a, b) => issueCount[a] > issueCount[b] ? a : b) 
          : 'N/A';
        
        // Find top day part
        const dayPartCount = {};
        data.forEach(complaint => {
          dayPartCount[complaint.dayPart] = (dayPartCount[complaint.dayPart] || 0) + 1;
        });
        const topDayPart = Object.keys(dayPartCount).length > 0
          ? Object.keys(dayPartCount).reduce((a, b) => dayPartCount[a] > dayPartCount[b] ? a : b)
          : 'N/A';
        
        // Find top manager
        const managerCount = {};
        data.forEach(complaint => {
          managerCount[complaint.managerName] = (managerCount[complaint.managerName] || 0) + 1;
        });
        const topManager = Object.keys(managerCount).length > 0
          ? Object.keys(managerCount).reduce((a, b) => managerCount[a] > managerCount[b] ? a : b)
          : 'N/A';
        
        setStats({ total, totalUnresolved, flaggedGuests, topIssue, topDayPart, topManager });
      };

      const toggleResolved = async (complaint, followUpNotes) => {
        try {
          const newResolved = !complaint.resolved;
          const notes = newResolved ? (followUpNotes || '') : (complaint.followUpNotes || '');
          const response = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: 'toggleResolved',
              id: complaint.id,
              resolved: newResolved,
              followUpNotes: notes
            }),
          });
          
          if (response.ok) {
            const updatedComplaints = complaints.map(c => 
              c.id === complaint.id ? { ...c, resolved: newResolved, followUpNotes: notes } : c
            );
            setComplaints(updatedComplaints);
            calculateStats(updatedComplaints);
            apiCache.clear();
          }
        } catch (error) {
          console.error('Error toggling resolved status:', error);
        }
      };

      const filteredComplaints = showResolvedFilter 
        ? complaints.filter(c => !c.resolved)
        : complaints;

      if (loading) {
        return <LoadingSpinner text="Loading dashboard data..." />;
      }

      return (
        <div>
          <div style={styles.statsGrid} className="stats-grid">
            <div style={styles.statCard}>
              <div style={styles.statNumber}>{stats.total}</div>
              <div style={styles.statLabel}>Total Complaints ({archiveDays} days)</div>
            </div>
            <div style={styles.statCard}>
              <div style={styles.statNumber}>{stats.totalUnresolved}</div>
              <div style={styles.statLabel}>Unresolved Complaints</div>
            </div>
            <div style={styles.statCard}>
              <div style={styles.statNumber}>{stats.flaggedGuests}</div>
              <div style={styles.statLabel}>Flagged Guests (2+ in 30 days)</div>
            </div>
            <div style={styles.statCard}>
              <div style={styles.statNumber}>{stats.topIssue}</div>
              <div style={styles.statLabel}>Most Common Issue</div>
            </div>
            <div style={styles.statCard}>
              <div style={styles.statNumber}>{stats.topDayPart}</div>
              <div style={styles.statLabel}>Busiest Day Part</div>
            </div>
            <div style={styles.statCard}>
              <div style={styles.statNumber}>{stats.topManager}</div>
              <div style={styles.statLabel}>Most Reports By</div>
            </div>
          </div>

          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
            <h3 style={{ color: '#333' }}>Recent Complaints</h3>
            <label className="checkbox-container">
              <input
                type="checkbox"
                checked={showResolvedFilter}
                onChange={(e) => setShowResolvedFilter(e.target.checked)}
              />
              <span>Hide resolved complaints</span>
            </label>
          </div>

          {filteredComplaints.length === 0 ? (
            <p style={{ color: '#999', textAlign: 'center' }}>No complaints to display</p>
          ) : (
            filteredComplaints.slice(0, 10).map((complaint, index) => (
              <div key={index} className="result-card" style={{
                ...styles.resultCard,
                ...(complaint.resolved ? { opacity: 0.6, background: '#f8f9fa' } : {})
              }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '10px' }}>
                  <strong>{complaint.guestName}</strong>
                  <span style={{ color: '#999', fontSize: '14px' }}>
                    {new Date(complaint.timestamp).toLocaleDateString()}
                    {complaint.resolved && <span className="resolved-badge">Resolved</span>}
                  </span>
                </div>
                <div style={{ fontSize: '14px', color: '#666' }}>
                  <div><strong>Phone:</strong> <span className="guest-profile-link" onClick={() => { setGuestProfilePhone(complaint.phone); setShowGuestProfile(true); }}>{String(complaint.phone).replace(/(\d{3})(\d{3})(\d{4})/, '($1) $2-$3')}</span></div>

                    }}
                    id={`resolve-${complaint.id}`}
                    aria-label={`Mark ${complaint.guestName}'s complaint as resolved`}
                  />
                  <span>Mark as resolved</span>

                {resolvingId === complaint.id && (

    function SearchView() {
      const [searchTerm, setSearchTerm] = useState('');
      const [filterType, setFilterType] = useState('all');
      const [results, setResults] = useState([]);
      const [allComplaints, setAllComplaints] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [editingComplaint, setEditingComplaint] = useState(null);
      const [showEditModal, setShowEditModal] = useState(false);
      const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
      const [complaintToDelete, setComplaintToDelete] = useState(null);
      const [hideResolved, setHideResolved] = useState(false);
      const [sortBy, setSortBy] = useState('date-desc');
      const [resolvingId, setResolvingId] = useState(null);
      const [followUpText, setFollowUpText] = useState('');
      const [showGuestProfile, setShowGuestProfile] = useState(false);
      const [guestProfilePhone, setGuestProfilePhone] = useState(null);
      const archiveDays = parseInt(localStorage.getItem('archiveDays') || '35');

      // Pagination state
      const [currentPage, setCurrentPage] = useState(1);
      const resultsPerPage = 20;

      useEffect(() => {
        fetchAllComplaints();
      }, []);

      // Reset to page 1 when search/filter/sort changes
      useEffect(() => {
        setCurrentPage(1);
      }, [searchTerm, filterType, sortBy, hideResolved]);

      const fetchAllComplaints = async () => {
        setLoading(true);
        setError(null);

        // Check cache first
        const cached = apiCache.get('allComplaints');
        if (cached) {
          setAllComplaints(cached);
          setResults(cached);
          setLoading(false);
          return;
        }

        try {
          const response = await fetchWithRetry(`${APPS_SCRIPT_URL}?action=getAll`);
          const result = await response.json();

          // Extract the data array from the response
          const data = result.data || result;

          const cutoffDate = new Date();
          cutoffDate.setDate(cutoffDate.getDate() - archiveDays);

          const activeComplaints = data.filter(complaint => {
            const complaintDate = new Date(complaint.timestamp);
            return complaintDate > cutoffDate;
          });

          // Cache the results
          apiCache.set('allComplaints', activeComplaints, 2);

          setAllComplaints(activeComplaints);
          setResults(activeComplaints);
        } catch (err) {
          console.error('Error fetching data:', err);
          setError(getErrorMessage(err, 'fetch'));
        } finally {
          setLoading(false);
        }
      };

      const handleSearch = (term, filter) => {
        setSearchTerm(term);
        setFilterType(filter);

        if (!term.trim()) {
          setResults(allComplaints);
          return;
        }

        const searchLower = term.toLowerCase();
        const normalizedPhone = term.replace(/\D/g, '');

        const filtered = allComplaints.filter(complaint => {
          const name = String(complaint.guestName ?? '').toLowerCase();
          const phone = String(complaint.phone ?? '');
          const order = String(complaint.orderNumber ?? '').toLowerCase();
          const issue = String(complaint.issueType ?? '').toLowerCase();
          const manager = String(complaint.managerName ?? '').toLowerCase();
          const notes = String(complaint.notes ?? '').toLowerCase();

          if (filter === 'all') {
            return (
              name.includes(searchLower) ||
              (normalizedPhone && phone.includes(normalizedPhone)) ||
              order.includes(searchLower) ||
              issue.includes(searchLower) ||
              manager.includes(searchLower) ||
              notes.includes(searchLower)
            );
          } else if (filter === 'phone') {
            return phone.includes(normalizedPhone);
          } else if (filter === 'name') {
            return name.includes(searchLower);
          } else if (filter === 'order') {
            return order.includes(searchLower);
          } else if (filter === 'issue') {
            return issue.includes(searchLower);
          } else if (filter === 'manager') {
            return manager.includes(searchLower);
          } else if (filter === 'notes') {
            return notes.includes(searchLower);
          }
          return false;
        });

        setResults(filtered);
      };

      // Process results: hide resolved -> sort -> paginate
      const processedResults = useMemo(() => {
        let processed = hideResolved ? results.filter(c => !c.resolved) : results;

        const sorted = [...processed];
        switch (sortBy) {
          case 'date-desc':
            sorted.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            break;
          case 'date-asc':
            sorted.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            break;
          case 'name-asc':
            sorted.sort((a, b) => (a.guestName || '').localeCompare(b.guestName || ''));
            break;
          case 'name-desc':
            sorted.sort((a, b) => (b.guestName || '').localeCompare(a.guestName || ''));
            break;
          case 'issue':
            sorted.sort((a, b) => (a.issueType || '').localeCompare(b.issueType || ''));
            break;
          case 'resolved':
            sorted.sort((a, b) => (a.resolved === b.resolved ? 0 : a.resolved ? 1 : -1));
            break;
        }
        return sorted;
      }, [results, hideResolved, sortBy]);

      const totalPages = Math.ceil(processedResults.length / resultsPerPage);
      const indexOfLastResult = currentPage * resultsPerPage;
      const indexOfFirstResult = indexOfLastResult - resultsPerPage;
      const currentResults = processedResults.slice(indexOfFirstResult, indexOfLastResult);

      const handleEdit = (complaint) => {
        setEditingComplaint(complaint);
        setShowEditModal(true);
      };

      const handleSaveEdit = async (updatedComplaint) => {
        try {
          const response = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: 'update',
              ...updatedComplaint
            }),
          });
          
          if (response.ok) {
            const updatedComplaints = allComplaints.map(c => 
              c.id === updatedComplaint.id ? updatedComplaint : c
            );
            setAllComplaints(updatedComplaints);
            handleSearch(searchTerm, filterType);
            setShowEditModal(false);
          }
        } catch (error) {
          console.error('Error updating complaint:', error);
        }
      };

      const handleDelete = async () => {
        if (!complaintToDelete) return;
        
        try {
          const response = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: 'delete',
              id: complaintToDelete.id
            }),
          });
          
          if (response.ok) {
            const updatedComplaints = allComplaints.filter(c => c.id !== complaintToDelete.id);
            setAllComplaints(updatedComplaints);
            handleSearch(searchTerm, filterType);
            setShowDeleteConfirm(false);
            setComplaintToDelete(null);
          }
        } catch (error) {
          console.error('Error deleting complaint:', error);
        }
      };

      const toggleResolved = async (complaint, followUpNotes) => {
        try {
          const newResolved = !complaint.resolved;
          const notes = newResolved ? (followUpNotes || '') : (complaint.followUpNotes || '');
          const response = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: 'toggleResolved',
              id: complaint.id,
              resolved: newResolved,
              followUpNotes: notes
            }),
          });
          
          if (response.ok) {
            const updatedComplaints = allComplaints.map(c => 
              c.id === complaint.id ? { ...c, resolved: newResolved, followUpNotes: notes } : c
            );
            setAllComplaints(updatedComplaints);
            const updatedResults = results.map(c =>
              c.id === complaint.id ? { ...c, resolved: newResolved, followUpNotes: notes } : c
            );
            setResults(updatedResults);
            apiCache.clear();
          }
        } catch (error) {
          console.error('Error toggling resolved status:', error);
        }
      };

      if (loading) {
        return <LoadingSpinner text="Loading complaints..." />;
      }

      if (error) {
        return (
          <div style={{ textAlign: 'center', padding: '40px' }}>
            <div style={{ color: '#dc3545', marginBottom: '20px' }}>{error}</div>
            <button
              onClick={() => {
                apiCache.clear();
                fetchAllComplaints();
              }}
              style={{ ...styles.button, width: 'auto', padding: '10px 30px' }}
            >
              Retry
            </button>
          </div>
        );
      }

      return (
        <div>
          <div style={styles.searchContainer}>
            <div style={{ marginBottom: '10px' }}>
              <select
                style={{ ...styles.select, width: '200px', marginBottom: '10px' }}
                className="filter-select"
                value={filterType}
                onChange={(e) => {
                  setFilterType(e.target.value);
                  handleSearch(searchTerm, e.target.value);
                }}
                aria-label="Filter by field"
              >
                <option value="all">All Fields</option>
                <option value="phone">Phone Number</option>
                <option value="name">Guest Name</option>
                <option value="order">Order Number</option>
                <option value="issue">Issue Type</option>
                <option value="manager">Manager Name</option>
                <option value="notes">Description</option>
              </select>
              {filterType !== 'all' && (
                <span className="active-filter-badge">
                  Filtering by: {filterType}
                </span>
              )}
            </div>

            <div style={{ position: 'relative' }}>
              <input
                type="text"
                style={styles.searchInput}
                aria-label="Search complaints"
                placeholder={
                  filterType === 'all' 
                    ? "Search all fields..." 
                    : `Search by ${filterType}...`
                }
                value={searchTerm}
                onChange={(e) => handleSearch(e.target.value, filterType)}
              />
              <Search
                size={20}
                color="#999"
                style={{
                  position: 'absolute',
                  right: '12px',
                  top: '50%',
                  transform: 'translateY(-50%)',
                  pointerEvents: 'none',
                }}
              />
            </div>
          </div>

          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '10px', marginBottom: '15px' }} className="search-controls">
            <div style={{ display: 'flex', gap: '10px', alignItems: 'center', flexWrap: 'wrap' }}>
              <select
                style={{ ...styles.select, width: '170px', marginBottom: '0' }}
                value={sortBy}
                onChange={(e) => setSortBy(e.target.value)}
                aria-label="Sort results"
              >
                <option value="date-desc">Newest First</option>
                <option value="date-asc">Oldest First</option>
                <option value="name-asc">Name (A-Z)</option>
                <option value="name-desc">Name (Z-A)</option>
                <option value="issue">Issue Type</option>
                <option value="resolved">Resolved Status</option>
              </select>
              {sortBy !== 'date-desc' && (
                <span className="sort-badge">
                  Sorted: {
                    { 'date-asc': 'Oldest', 'name-asc': 'A-Z', 'name-desc': 'Z-A', 'issue': 'Issue', 'resolved': 'Status' }[sortBy]
                  }
                </span>
              )}
            </div>
            <label className="checkbox-container" style={{ marginTop: '0' }}>
              <input
                type="checkbox"
                checked={hideResolved}
                onChange={(e) => setHideResolved(e.target.checked)}
              />
              <span>Hide resolved</span>
            </label>
          </div>

          <div style={{ marginBottom: '20px', color: '#666' }}>
            {processedResults.length === 0 ? (
              <span>No results found</span>
            ) : (
              <span>
                Showing {indexOfFirstResult + 1}-{Math.min(indexOfLastResult, processedResults.length)} of {processedResults.length} results
                {processedResults.length !== allComplaints.length && ` (filtered from ${allComplaints.length} total)`}
              </span>
            )}
          </div>

          <div style={styles.resultsContainer}>
            {currentResults.map((complaint, index) => (
              <div key={complaint.id || index} className="result-card" style={{
                ...styles.resultCard,
                ...(complaint.resolved ? { opacity: 0.6, background: '#f8f9fa' } : {})
              }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '10px' }}>
                  <strong style={{ fontSize: '18px' }}>{complaint.guestName}</strong>
                  <span style={{ color: '#999', fontSize: '14px' }}>
                    {new Date(complaint.timestamp).toLocaleDateString()}
                    {complaint.resolved && <span className="resolved-badge">✓ Resolved</span>}
                  </span>
                </div>
                <div style={{ fontSize: '14px', color: '#666', lineHeight: '1.6' }}>
                  <div><strong>Phone:</strong> <span className="guest-profile-link" onClick={() => { setGuestProfilePhone(complaint.phone); setShowGuestProfile(true); }}>{String(complaint.phone).replace(/(\d{3})(\d{3})(\d{4})/, '($1) $2-$3')}</span></div>
                  <div><strong>Order:</strong> {complaint.orderNumber} ({complaint.orderType})</div>
                  <div><strong>Issue:</strong> {complaint.issueType}</div>
                  <div>
                    <strong>Resolution:</strong> {complaint.resolution}
                    {complaint.includedDessert && <span style={{ color: '#28a745', marginLeft: '10px' }}>🍪 + Free Dessert</span>}
                  </div>
                  <div><strong>Day Part:</strong> {complaint.dayPart}</div>
                  <div><strong>Date Occurred:</strong> {complaint.dateOccurred}</div>
                  <div><strong>Manager:</strong> {complaint.managerName}</div>
                  {complaint.notes && <div style={{ marginTop: '10px' }}><strong>Description:</strong> {complaint.notes}</div>}
                  {complaint.followUpNotes && (
                    <div className="follow-up-notes">
                      <strong>Follow-up:</strong> {complaint.followUpNotes}
                    </div>
                  )}
                </div>
                <div style={styles.actionButtons} className="action-buttons">
                  <button style={styles.actionButton} onClick={() => handleEdit(complaint)} aria-label={`Edit complaint for ${complaint.guestName}`}>
                    <Edit size={16} /> Edit
                  </button>
                  <button
                    style={{ ...styles.actionButton, borderColor: '#dc3545', color: '#dc3545' }}
                    onClick={() => {
                      setComplaintToDelete(complaint);
                      setShowDeleteConfirm(true);
                    }}
                    aria-label={`Delete complaint for ${complaint.guestName}`}
                  >
                    <Trash size={16} /> Delete
                  </button>
                </div>
                <div className="checkbox-container">
                  <input
                    type="checkbox"
                    checked={complaint.resolved || false}
                    onChange={() => {
                      if (complaint.resolved) {
                        toggleResolved(complaint);
                      } else {
                        setResolvingId(complaint.id);
                        setFollowUpText('');
                      }
                    }}
                    id={`search-resolve-${complaint.id}`}
                    aria-label={`Mark ${complaint.guestName}'s complaint as resolved`}
                  />
                  <span>Mark as resolved</span>
                </div>
                {resolvingId === complaint.id && (
                  <div className="resolve-form">
                    <label style={{ fontSize: '13px', fontWeight: '600', marginBottom: '5px', display: 'block' }}>
                      Follow-up notes (optional)
                    </label>
                    <textarea
                      value={followUpText}
                      onChange={(e) => setFollowUpText(e.target.value)}
                      placeholder="Describe how this was resolved..."
                    />
                    <div className="resolve-form-buttons">
                      <button
                        onClick={() => setResolvingId(null)}
                        style={{ padding: '6px 16px', border: '1px solid #e0e0e0', borderRadius: '6px', background: 'white', cursor: 'pointer', fontSize: '13px' }}
                      >
                        Cancel
                      </button>
                      <button
                        onClick={() => { toggleResolved(complaint, followUpText); setResolvingId(null); }}
                        style={{ padding: '6px 16px', border: 'none', borderRadius: '6px', background: '#28a745', color: 'white', cursor: 'pointer', fontSize: '13px', fontWeight: '600' }}
                      >
                        Mark Resolved
                      </button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* Pagination Controls */}
          {totalPages > 1 && (
            <div className="pagination" role="navigation" aria-label="Pagination">
              <button
                onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                disabled={currentPage === 1}
                aria-label="Previous page"
              >
                Previous
              </button>
              <span className="pagination-info">
                Page {currentPage} of {totalPages}
              </span>
              <button
                onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
                disabled={currentPage === totalPages}
                aria-label="Next page"
              >
                Next
              </button>
            </div>
          )}

          <EditComplaintModal
            complaint={editingComplaint}
            isOpen={showEditModal}
            onClose={() => setShowEditModal(false)}
            onSave={handleSaveEdit}
          />

          <ConfirmDialog
            isOpen={showDeleteConfirm}
            onClose={() => {
              setShowDeleteConfirm(false);
              setComplaintToDelete(null);
            }}
            onConfirm={handleDelete}
            title="Delete Complaint"
            message="Are you sure you want to delete this complaint? This action cannot be undone."
            confirmText="Delete"
            cancelText="Cancel"
          />

          <GuestProfileModal
            isOpen={showGuestProfile}
            onClose={() => setShowGuestProfile(false)}
            phone={guestProfilePhone}
            complaints={allComplaints}
          />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
