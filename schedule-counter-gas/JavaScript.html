/**
 * Reshapes history rows into scheduleData/salesData format,
 * renders via generateScheduleTable() (the existing renderer),
 * then clones the output into the drill-down modal.
 * Saves and restores global state — the main view is unaffected.
 */
function renderDrillDown(data, weekStart) {
  var drillSched = {}, drillSales = {};

  (data.scheduleRows || []).forEach(function(row) {
    var day = String(row[1]), hour = String(row[2]), combined = row[5] || 0;
    if (!drillSched[day]) drillSched[day] = {};
    drillSched[day][hour] = combined;
  });
  (data.salesRows || []).forEach(function(row) {
    var day = String(row[1]), hour = String(row[2]), sales = row[3] || 0;
    if (!drillSales[day]) drillSales[day] = {};
    drillSales[day][hour] = sales;
  });

  // Swap globals → render → restore
  var savedSched = scheduleData, savedSales = salesData, savedView = currentDepartmentView;
  currentDepartmentView = 'overall';
  scheduleData = drillSched;
  salesData    = drillSales;
  generateScheduleTable();

  // Clone the rendered table into the modal
  var tableEl = document.getElementById('scheduleTable');
  var content = document.getElementById('drillDownContent');
  if (content && tableEl) {
    content.innerHTML = '';
    var wrapper = document.createElement('div');
    wrapper.style.overflowX = 'auto';
    wrapper.appendChild(tableEl.cloneNode(true));
    content.appendChild(wrapper);
  }

  // Restore globals and re-render main view
  scheduleData          = savedSched;
  salesData             = savedSales;
  currentDepartmentView = savedView;
  if (Object.keys(savedSched).length > 0) generateScheduleTable();

  hideDrillDownSpinner();
}

/**
 * Shows or hides the amber bias banner at the top of the Schedule Analysis tab.
 * Checks sessionStorage so the user's dismiss survives tab switches but resets on reload.
 */
function applyBiasBanner(biasFlags, threshold) {
  var banner = document.getElementById('biasBanner');
  var body   = document.getElementById('biasBannerBody');
  if (!banner || !body) return;

  var dismissed = sessionStorage.getItem('biasBannerDismissed');
  var activeFlags = Object.keys(biasFlags).filter(function(d) { return biasFlags[d] !== null; });

  if (activeFlags.length === 0 || dismissed === 'true') {
    banner.style.display = 'none';
    return;
  }

  var lines = ['<div class="bias-banner-title">\u26a0\ufe0f Forecast Accuracy Alert</div>'];
  activeFlags.forEach(function(day) {
    var f   = biasFlags[day];
    var dir = f.direction === 'over' ? 'over-estimating' : 'under-estimating';
    var pct = Math.abs(f.avgErrorPct);
    var tip = f.direction === 'over'
      ? 'staffing targets may be too high'
      : 'staffing targets may be too low';
    lines.push(
      '<div class="bias-banner-item"><strong>' + day + ':</strong> ' +
      dir + ' by ~' + pct + '% over ' + f.sampleCount + ' weeks \u2014 ' + tip + '.</div>'
    );
  });
  body.innerHTML = lines.join('');
  banner.style.display = 'flex';
}

function dismissBiasBanner() {
  sessionStorage.setItem('biasBannerDismissed', 'true');
  var banner = document.getElementById('biasBanner');
  if (banner) banner.style.display = 'none';
}

/**
 * Renders the Forecast Accuracy table in the Trends tab bias section.
 */
function renderBiasSection(biasFlags) {
  var section = document.getElementById('trendsBiasSection');
  if (!section) return;

  var activeFlags = Object.keys(biasFlags).filter(function(d) { return biasFlags[d] !== null; });

  if (activeFlags.length === 0) {
    section.innerHTML =
      '<div style="font-size:13px; color:#64748b; font-style:italic;">' +
      '\u2705 No significant forecast bias detected \u2014 curves are tracking well.' +
      '</div>';
    return;
  }

  var rows = activeFlags.map(function(day) {
    var f       = biasFlags[day];
    var pct     = Math.abs(f.avgErrorPct);
    var dirLabel = f.direction === 'over' ? 'Over-estimating' : 'Under-estimating';
    var dirColor = f.direction === 'over' ? '#d97706' : '#dc2626';
    var action   = f.direction === 'over'
      ? 'Consider trimming staffing on ' + day + ' by ~' + pct + '%.'
      : 'Consider adding coverage on ' + day + ' by ~' + pct + '%.';
    return (
      '<tr>' +
        '<td style="padding:10px 12px; font-weight:600; color:#1e293b;">' + day + '</td>' +
        '<td style="padding:10px 12px; text-align:center; color:' + dirColor + '; font-weight:700;">' +
          (f.direction === 'over' ? '+' : '') + f.avgErrorPct + '%' +
        '</td>' +
        '<td style="padding:10px 12px; color:' + dirColor + ';">' + dirLabel + '</td>' +
        '<td style="padding:10px 12px; font-size:12px; color:#64748b;">' + action + '</td>' +
      '</tr>'
    );
  }).join('');

  section.innerHTML =
    '<div style="font-size:15px; font-weight:700; color:#1e293b; margin-bottom:12px;">' +
    '\u26a0\ufe0f Forecast Accuracy Flags</div>' +
    '<div style="overflow-x:auto;">' +
    '<table style="width:100%; border-collapse:collapse; font-size:13px;">' +
      '<thead><tr style="background:#f8fafc; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:#64748b;">' +
        '<th style="padding:8px 12px; text-align:left; border-bottom:2px solid #e2e8f0;">Day</th>' +
        '<th style="padding:8px 12px; text-align:center; border-bottom:2px solid #e2e8f0;">Avg Error %</th>' +
        '<th style="padding:8px 12px; text-align:left; border-bottom:2px solid #e2e8f0;">Direction</th>' +
        '<th style="padding:8px 12px; text-align:left; border-bottom:2px solid #e2e8f0;">Suggested Action</th>' +
      '</tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table></div>' +
    '<p style="font-size:11px; color:#94a3b8; margin-top:10px; margin-bottom:0;">' +
    'Based on comparing your estimated sales entries vs. actual CFA data over ' +
    activeFlags[0] && biasFlags[activeFlags[0]] ? biasFlags[activeFlags[0]].sampleCount + ' weeks.' : 'multiple weeks.' +
    '</p>';
}

/**
 * Shows CFA pre-fill suggestion hints below each daily sales input
 * when the app_cache contains currentWeekSales from the Monday pipeline.
 */
function applyCFASuggestions(currentWeekSales) {
  DAYS.forEach(function(day) {
    var total = currentWeekSales[day];
    if (!total || total <= 0) return;
    var inputId  = 'sales-' + day;
    var hintId   = 'cfa-hint-' + day;
    var inputEl  = document.getElementById(inputId);
    var hintEl   = document.getElementById(hintId);
    if (!inputEl) return;

    // Create hint element lazily if it doesn't exist yet
    if (!hintEl) {
      hintEl    = document.createElement('div');
      hintEl.id = hintId;
      hintEl.className = 'cfa-hint';
      inputEl.parentNode.insertBefore(hintEl, inputEl.nextSibling);
    }

    var formatted = '$' + Math.round(total).toLocaleString();
    hintEl.textContent = 'CFA: ' + formatted + ' \u2014 use this?';
    hintEl.style.display = 'block';
    // Wire click: fill input, set source to api, hide hint
    hintEl.onclick = (function(inp, val, hnt, dayName) {
      return function() {
        inp.value = Math.round(val);
        currentSalesSource = 'api';
        hnt.style.display = 'none';
        saveSalesInputs();
        if (Object.keys(scheduleData).length > 0) generateReport();
      };
    })(inputEl, total, hintEl, day);

    // If operator manually edits the input, revert source to 'estimated' and hide hint
    inputEl.addEventListener('input', function() {
      currentSalesSource = 'estimated';
      hintEl.style.display = 'none';
    }, { once: true });
  });
}

/**
 * Reads trigger installation status from the backend and updates the status badges.
 * Called when the Settings tab opens.
 */
function loadTriggersStatus() {
  var sundayBadge   = document.getElementById('status-sunday');
  var mondayBadge   = document.getElementById('status-monday');
  var thursdayBadge = document.getElementById('status-thursday');
  var installBtn    = document.getElementById('btn-install-triggers');
  if (sundayBadge)   { sundayBadge.textContent = 'Checking\u2026';   sundayBadge.className = 'automation-status-badge'; }
  if (mondayBadge)   { mondayBadge.textContent = 'Checking\u2026';   mondayBadge.className = 'automation-status-badge'; }
  if (thursdayBadge) { thursdayBadge.textContent = 'Checking\u2026'; thursdayBadge.className = 'automation-status-badge'; }

  google.script.run
    .withSuccessHandler(function(status) {
      if (!status) return;
      if (sundayBadge) {
        sundayBadge.textContent = status.sunday.installed ? 'Active' : 'Not Installed';
        sundayBadge.className   = 'automation-status-badge ' + (status.sunday.installed ? 'active' : 'inactive');
      }
      if (mondayBadge) {
        mondayBadge.textContent = status.monday.installed ? 'Active' : 'Not Installed';
        mondayBadge.className   = 'automation-status-badge ' + (status.monday.installed ? 'active' : 'inactive');
      }
      if (thursdayBadge && status.thursday) {
        thursdayBadge.textContent = status.thursday.installed ? 'Active' : 'Not Installed';
        thursdayBadge.className   = 'automation-status-badge ' + (status.thursday.installed ? 'active' : 'inactive');
      }
      if (installBtn) {
        var allInstalled = status.sunday.installed && status.monday.installed &&
                           (!status.thursday || status.thursday.installed);
        installBtn.disabled = allInstalled;
      }
    })
    .withFailureHandler(function(err) {
      if (sundayBadge)   sundayBadge.textContent   = 'Error';
      if (mondayBadge)   mondayBadge.textContent   = 'Error';
      if (thursdayBadge) thursdayBadge.textContent = 'Error';
      console.error('[loadTriggersStatus]', err.message);
    })
    .getTriggersStatus();
}

function installTriggersFromSettings() {
  var btn    = document.getElementById('btn-install-triggers');
  var result = document.getElementById('automation-result');
  if (btn) { btn.disabled = true; btn.textContent = 'Installing\u2026'; }

      if (btn) { btn.disabled = false; btn.textContent = '\u25b6 Install Triggers'; }
      if (result) {
        result.style.background = '#f0fdf4';
        result.style.border     = '1px solid #86efac';
        result.style.color      = '#15803d';
        result.textContent      = '\u2705 Triggers installed successfully. Sunday 22:00, Monday 06:00, and Thursday 19:00 are now active.';
        result.style.display    = 'block';
      }
      loadTriggersStatus();
    })
    .withFailureHandler(function(err) {
      if (btn) { btn.disabled = false; btn.textContent = '\u25b6 Install Triggers'; }
      if (result) {
        result.style.background = '#fef2f2';
        result.style.border     = '1px solid #fecaca';
        result.style.color      = '#dc2626';
        result.textContent      = 'Error: ' + err.message;
        result.style.display    = 'block';
      }
    })
    .installTriggers();
}

function runRebuildCurves() {
  var btn    = document.getElementById('btn-rebuild-curves');
  var result = document.getElementById('automation-result');
  if (btn) { btn.disabled = true; btn.textContent = 'Rebuilding\u2026'; }
  if (result) {
    result.style.background = '#eff6ff';

// ── Forecast Tab ─────────────────────────────────────────────

var _forecastChartInstance = null;

function loadForecastData() {
  var spinner = document.getElementById('forecastSpinner');
  var error   = document.getElementById('forecastError');
  var content = document.getElementById('forecastContent');
  if (spinner) spinner.style.display = 'flex';
  if (error)   error.style.display   = 'none';
  if (content) content.style.display = 'none';

  google.script.run
    .withSuccessHandler(function(result) {
      if (spinner) spinner.style.display = 'none';
      if (!result || !result.predictions) {
        if (error) {
          error.textContent    = 'Not enough sales history to generate a forecast. Run the Monday pipeline at least once.';
          error.style.display  = 'block';
        }
        return;
      }
      renderForecast(result);
      if (content) content.style.display = 'block';
    })
    .withFailureHandler(function(err) {
      if (spinner) spinner.style.display = 'none';
      if (error) {
        error.textContent   = 'Error loading forecast: ' + err.message;
        error.style.display = 'block';
      }
    })
    .getSalesForecast();
}

function renderForecast(result) {
  var predictions = result.predictions;
  var weekStart   = result.weekStart;
  var orderedDays = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var labels      = [];
  var values      = [];
  var counts      = [];

  orderedDays.forEach(function(day) {
    if (predictions[day]) {
      labels.push(day.substring(0,3));
      values.push(predictions[day].total);
      counts.push(predictions[day].weekCount);
    }
  });

  // Update week label
  var weekLabel = document.getElementById('forecastWeekLabel');
  if (weekLabel && weekStart) {
    var d = new Date(weekStart + 'T00:00:00');
    weekLabel.textContent = 'Predicted week starting ' +
      d.toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
  }

  // Render summary cards
  var cardsEl = document.getElementById('forecastCards');
  if (cardsEl) {
    cardsEl.innerHTML = orderedDays.map(function(day) {
      var p = predictions[day];
      if (!p) return '';
      var trendHtml = '';
      if (p.trend && p.trend !== 0) {
        var trendSign  = p.trend > 0 ? '+' : '';
        var trendColor = p.trend > 0 ? '#16a34a' : '#dc2626';
        var trendArrow = p.trend > 0 ? '\u2197' : '\u2198';
        trendHtml = '<div class="forecast-card-trend" style="color:' + trendColor + ';font-size:11px;margin-top:2px;">' +
          trendArrow + ' ' + trendSign + '$' + Math.abs(p.trend).toLocaleString() + ' trend adj</div>';
      }
      return '<div class="forecast-card">' +
        '<div class="forecast-card-day">' + day + '</div>' +
        '<div class="forecast-card-total">$' + p.total.toLocaleString() + '</div>' +
        trendHtml +
        '<div class="forecast-card-weeks">Avg of last ' + p.windowSize + ' week' + (p.windowSize !== 1 ? 's' : '') + '</div>' +
        '</div>';
    }).join('');
  }

  // Render chart
  var canvas = document.getElementById('forecastChart');
  if (!canvas) return;
  if (_forecastChartInstance) { _forecastChartInstance.destroy(); _forecastChartInstance = null; }
  _forecastChartInstance = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Predicted Sales ($)',
        data:  values,
        backgroundColor: 'rgba(99,102,241,0.7)',
        borderColor:     'rgba(99,102,241,1)',
        borderWidth: 1,
        borderRadius: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              return ' $' + ctx.parsed.y.toLocaleString();
            },
            afterLabel: function(ctx) {
              return ' (' + counts[ctx.dataIndex] + ' weeks of data)';
            }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: false,
          ticks: {
            callback: function(val) { return '$' + val.toLocaleString(); }
          }
        }
      }
    }
  });
}

// ── GAS Config Load (DOMContentLoaded) ───────────────────────
// Only runs in the main app (Index.html). Onboarding.html does not have
// converterTabPanel, so we skip the config load entirely on that page.
(function() {
  if (!document.getElementById('converterTabPanel')) return;

  function initWithGAS() {
    showLoadingState('Loading configuration\u2026');
    google.script.run
      .withSuccessHandler(function(config) {
        applyConfig(config, true);
        hideLoadingState();
      })
      .withFailureHandler(function(err) {
        console.warn('[Schedule Counter] loadAppCache() failed:', err);
        applyConfig(getDefaultConfig(), false);
        showWarningBanner('Could not load configuration from Sheets. Using defaults. Verify initSheets() has been run.');
        hideLoadingState();
      })
      .loadAppCache();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initWithGAS);
  } else {
    initWithGAS();
  }
})();
